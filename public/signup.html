<!-- URL: http://localhost:3000/signup.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - PawDesk</title>

    <!--CSS-->
    <link rel="stylesheet" href="css/signupStyles.css">

    <!--FUENTE-->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <!--ICONOS-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!--TOAST-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
</head>
<body>
    <div class="container">
    <img src="img/logo-pawdesk.png" alt="Logo PawDesk" class="logo">
    <h1>Registro de usuario</h1>

    <form id="signupForm" novalidate>
        <div>
            <label for="username">Nombre de usuario:</label>
            <input type="text" id="username" required>
        </div>
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" required 
            placeholder="usuario@clinica.com">
        </div>
        <div class="password-field">
            <input type="password" id="password" required>
            <i class="fa-solid fa-eye togglePassword" data-target="password"></i>
        </div>
        <div class="password-field">
            <input type="password" id="confirmPassword" required>
            <i class="fa-solid fa-eye togglePassword" data-target="confirmPassword"></i>
        </div>

        <button type="submit">Registrarse</button>

    </form>

    <p>¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="js/signup.js"></script>
</body>
